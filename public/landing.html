<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixx TZ - Karibu</title>
  <link rel="stylesheet" href="landing.css">
</head>
<body>
  <div class="background-wrapper">
    <div class="container">
      <!-- Header with Logo -->
      <div class="header">
        <div class="logo">
          <span class="logo-text">Mixx</span>
          <span class="logo-badge">TZ</span>
        </div>
      </div>

      <!-- Welcome Section -->
      <div class="welcome-section">
        <h1 class="welcome-title">Karibu - Welcome</h1>
        <p class="welcome-description">Chagua kile unakochohitaji:</p>
      </div>

      <!-- Options Cards -->
      <div class="options-container">
        <!-- Submit Entry Card -->
        <a href="/form" class="option-card">
          <div class="card-icon">👤</div>
          <h2 class="card-title">Kuingiza Ombi</h2>
          <p class="card-description">Submit Entry</p>
        </a>

        <!-- Admin Panel Card -->
        <a href="/admin" class="option-card admin-card">
          <div class="card-icon">📊</div>
          <h2 class="card-title">Paneli ya Admin</h2>
          <p class="card-description">Admin Panel</p>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
